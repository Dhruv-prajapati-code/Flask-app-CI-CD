name: dependency-scan

on:
  workflow_call:
jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v6

            - name: python setup
              uses: actions/setup-python@v6
              with:
                python-version: "3.12"

            - name: install audit and test
              run: pip install pip-audit && pip-audit -r requirements.txt --vulnerability-service osv
            
            
