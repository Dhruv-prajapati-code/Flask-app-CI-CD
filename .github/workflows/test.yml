name: workflow_name

on:
    workflow_dispatch:

jobs:
    test_hello:
        runs-on: ubuntu-latest

        steps:
          - name: checkout code
            uses: actions/checkout@v6

          - name: setup python
            uses: actions/setup-python@v6
            with:
                python-version: "3.13"

          - name: install dependencies
            run: pip install -r requirements.txt

          - name: run lint test
            run: flake8 app.py
        

              


