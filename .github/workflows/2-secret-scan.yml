name: secret-scan

on:
  workflow_call:

jobs:
    git_leaks:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
              with:
                fetch-depth: 0

            - name: git leaks ( secrets passed on git )
              uses: gitleaks/gitleaks-action@v2.3.9
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}